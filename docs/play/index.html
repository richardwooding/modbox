<style>
  html, body { margin: 0; height: 100%; background: #0b0a10; overflow: hidden; }
  #loading {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    color: #a78bfa; font: 14px ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  #loading .dim { color: #5a5470; }
  canvas { outline: none; }
</style>
</head>
<body>
<div id="loading">
  <div>modbox</div>
  <div class="dim" id="status">loading wasm…</div>
</div>
<script src="wasm_exec.js"></script>
<script>
(function () {
  var status = document.getElementById("status");
  var go = new Go();
  var boot = WebAssembly.instantiateStreaming
    ? WebAssembly.instantiateStreaming(fetch("modbox.wasm"), go.importObject)
    : fetch("modbox.wasm").then(function (r) { return r.arrayBuffer(); })
        .then(function (b) { return WebAssembly.instantiate(b, go.importObject); });
  boot.then(function (result) {
    document.getElementById("loading").remove();
    go.run(result.instance);
  }).catch(function (err) {
    status.textContent = "could not load modbox.wasm — " + err;
  });
})();
</script>
</body>
